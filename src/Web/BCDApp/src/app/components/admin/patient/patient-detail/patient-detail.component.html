<section class="main-content">
	<ul class="breadcrumb breadcrumb-style">
		<li class="breadcrumb-item">
			<h5 class="page-title m-b-0">Admin</h5>
		</li>
		<li class="breadcrumb-item bcrumb-1">
			<a routerLink="/dashboard/main"> <i class="fas fa-home font-17"></i></a>
		</li>

		<li class="breadcrumb-item">Patient Details</li>
	</ul>
	<div class="section-body">
		<div class="row">
			<div class="col-12 col-md-12 col-lg-12">
				<div class="card">
					<div class="card-body">
						<p-tabView [(activeIndex)]="activeIndex">
							<p-tabPanel header="{{ patientId === 0 ? 'Patient Registration' : 'Patient Detail' }}">
								<form class="register-form m-4" [formGroup]="patientDetailForm" *ngIf="patientDetailForm">
									<div class="row">
										<p>Besic Details</p>
										<div class="form-group col-md-6">
											<label for="name">NHS Number<span class="text-danger">*</span></label>
											<input
												[style]="{ width: '100%' }"
												class="p-inputtext-sm"
												id="name"
												type="text"
												placeholder="Enter name"
												formControlName="nhsNumber"
												required
												pInputText
											/>
											<small
												class="form-text text-danger"
												*ngIf="!patientDetailForm.get('nhsNumber').valid && patientDetailForm.get('nhsNumber').touched"
											>
												NHS Number is required</small
											>
										</div>
										<div class="form-group col-md-6">
											<label for="firstName">First Name<span class="text-danger">*</span></label>
											<input
												[style]="{ width: '100%' }"
												class="p-inputtext-sm"
												id="firstName"
												type="text"
												placeholder="Enter firstName"
												formControlName="firstName"
												required
												pInputText
											/>
											<small
												class="form-text text-danger"
												*ngIf="
													patientDetailForm.get('firstName').hasError('required') &&
													patientDetailForm.get('firstName').touched
												"
											>
												First name is required</small
											>
										</div>
										<div class="form-group col-md-6">
											<label for="firstName">Last Name<span class="text-danger">*</span></label>
											<input
												[style]="{ width: '100%' }"
												class="p-inputtext-sm"
												id="lastName"
												type="text"
												placeholder="Enter lastName"
												formControlName="lastName"
												required
												pInputText
											/>
											<small
												class="form-text text-danger"
												*ngIf="
													patientDetailForm.get('lastName').hasError('required') &&
													patientDetailForm.get('lastName').touched
												"
											>
												Last name is required</small
											>
										</div>
										<div class="form-group col-md-6">
											<label for="firstName">Mobile Number<span class="text-danger">*</span></label>
											<input
												[style]="{ width: '100%' }"
												class="p-inputtext-sm"
												id="mobileNumber"
												type="text"
												placeholder="Enter mobile number"
												formControlName="mobileNumber"
												required
												pInputText
											/>
											<small
												class="form-text text-danger"
												*ngIf="
													patientDetailForm.get('mobileNumber').hasError('required') &&
													patientDetailForm.get('mobileNumber').touched
												"
											>
												Mobile number is required</small
											>
										</div>
										<div class="form-group col-md-6">
											<label for="firstName">Date Of Birth<span class="text-danger">*</span></label>
											<p-calendar
												[style]="{ width: '100%' }"
												class="p-inputtext-sm"
												[showIcon]="true"
												dateFormat="M d, yy"
												formControlName="dateOfBirth"
												appendTo="body"
											/>
											<small
												class="form-text text-danger"
												*ngIf="
													patientDetailForm.get('dateOfBirth').hasError('required') &&
													patientDetailForm.get('dateOfBirth').touched
												"
											>
												Date Of Birth is required</small
											>
										</div>
										<div class="form-group col-md-6">
											<label for="name">Gender</label>
											<p-dropdown
												class="p-inputtext-sm"
												[options]="patinetMasterDataModel.listOfGenders"
												formControlName="gender"
												optionLabel="name"
												optionValue="id"
												[style]="{ width: '100%' }"
												placeholder="Select Gender"
											>
												<ng-template let-server pTemplate="item">
													<div class="country-item">
														<div>{{ server.name }}</div>
													</div>
												</ng-template>
											</p-dropdown>
										</div>
									</div>
									<div class="text-right">
										<button
											class="btn btn-primary mt-2 mr-3 me-2 pull-right"
											[disabled]="patientDetailForm.invalid"
											(click)="savePatient()"
										>
											{{ patientId === 0 ? 'Save' : 'Edit' }}
										</button>
									</div>
								</form>
							</p-tabPanel>
							<p-tabPanel header="Breast Cancer Detector" *ngIf="patientId != 0">
								<app-patient-breast-cancer-ditection
									*ngIf="activeIndex == 1"
									[patientId]="patientId"
								></app-patient-breast-cancer-ditection>
							</p-tabPanel>
							<p-tabPanel header="History" *ngIf="patientId != 0"> </p-tabPanel>
						</p-tabView>
					</div>
				</div>
			</div>
		</div>
	</div>
</section>
